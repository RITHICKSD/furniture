<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Create Account | Furnique Premium Furniture</title>
  <meta name="description" content="Create a new Furnique account." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23C97B4B'/><text x='50%25' y='65%25' text-anchor='middle' font-size='20' fill='white' font-family='serif'>F</text></svg>" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      position: relative;
      overflow-x: hidden;
      padding: 24px;
    }
    
    /* Background elements for premium feel */
    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; right: -100px; }
    .blob-2 { width: 400px; height: 400px; background: var(--sage); bottom: -100px; left: -100px; }

    .auth-card {
      width: 100%;
      max-width: 540px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 50px 40px;
      box-shadow: var(--shadow-lg);
      position: relative;
      backdrop-filter: blur(10px);
    }
    
    .auth-controls {
      position: absolute;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 8px;
    }
    
    .auth-btn-icon {
      width: 40px; height: 40px;
      border-radius: 12px;
      border: 1px solid var(--border);
      background: var(--bg-secondary);
      color: var(--text-primary);
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    .auth-btn-icon:hover {
      border-color: var(--accent);
      color: var(--accent);
      transform: translateY(-2px);
    }

    .auth-header { text-align: center; margin-bottom: 30px; }
    .auth-header h2 { 
      font-size: 20px; 
      color: var(--text-primary); 
      font-family: 'Playfair Display', serif; 
      font-weight: 400; 
      font-style: italic;
      margin-top: 10px; 
    }
    
    .btn-register {
      width: 100%;
      padding: 18px;
      border-radius: 50px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(201,123,75,0.2);
      margin-top: 20px;
    }
    .btn-register:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(201,123,75,0.3);
    }

    .auth-footer { text-align: center; margin-top: 30px; font-size: 14px; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    
    .terms-row {
      display: flex; align-items: flex-start; gap: 10px;
      margin: 20px 0;
      font-size: 13px;
      color: var(--text-muted);
    }
    .terms-row input { accent-color: var(--accent); margin-top: 3px; }
    .terms-row a { color: var(--accent); text-decoration: none; font-weight: 600; }

    [dir="rtl"] .auth-controls { right: auto; left: 24px; }

    @media (max-width: 480px) {
      .auth-card { padding: 40px 24px; border-radius: 24px; }
    }
  </style>
</head>
<body>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="auth-card">
    <div class="auth-controls">
      <button class="auth-btn-icon" onclick="toggleTheme()" title="Toggle Theme">
        <i data-lucide="moon" id="themeIcon"></i>
      </button>
      <button class="auth-btn-icon" onclick="toggleDir()" title="Toggle RTL/LTR">
        <i data-lucide="globe"></i>
      </button>
    </div>

    <div class="auth-header">
      <a href="index.html" class="logo" style="justify-content:center; margin-bottom: 24px;">
        <div class="logo-icon"><i data-lucide="armchair"></i></div>
        <span class="logo-text">Furni<span>que</span></span>
      </a>
      <h2>Create your account</h2>
    </div>

    <form action="user-dashboard.html">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" class="form-input" placeholder="John Doe" required />
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" class="form-input" placeholder="john@example.com" required />
      </div>
      <div class="form-group">
        <label>Phone Number</label>
        <input type="tel" class="form-input" placeholder="(555) 123-4567" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-input" placeholder="Create a password" required />
      </div>
      <div class="form-group">
        <label>Confirm Password</label>
        <input type="password" class="form-input" placeholder="Confirm your password" required />
      </div>
      
      <div class="terms-row">
        <input type="checkbox" id="terms" required />
        <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
      </div>

      <button type="submit" class="btn-register">CREATE ACCOUNT</button>
    </form>

    <div class="auth-footer">
      Already have an account? <a href="login.html">Login here</a>
    </div>
  </div>

  <script>
    lucide.createIcons();
    
    function toggleTheme() {
      document.body.classList.toggle('dark');
      const i = document.getElementById('themeIcon');
      i.setAttribute('data-lucide', document.body.classList.contains('dark') ? 'sun' : 'moon');
      lucide.createIcons();
    }
    
    function toggleDir() {
      const h = document.getElementById('html-root');
      const isRTL = h.getAttribute('dir') === 'rtl';
      h.setAttribute('dir', isRTL ? 'ltr' : 'rtl');
    }
  </script>
</body>
</html>
