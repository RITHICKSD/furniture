<!DOCTYPE html>
<html lang="en" id="html-root">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1.0" />
  <title>Login | Furnique Premium Furniture</title>
  <meta name="description" content="Login to your Furnique account." />
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23C97B4B'/><text x='50%25' y='65%25' text-anchor='middle' font-size='20' fill='white' font-family='serif'>F</text></svg>" />
  <script src="https://unpkg.com/lucide@latest"></script>
  <style>
    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: var(--bg-secondary);
      position: relative;
      overflow-x: hidden;
      padding: 20px;
    }
    
    /* Background elements for premium feel */
    .bg-blobs {
      position: fixed;
      inset: 0;
      z-index: -1;
      overflow: hidden;
      pointer-events: none;
    }
    .blob {
      position: absolute;
      border-radius: 50%;
      filter: blur(80px);
      opacity: 0.15;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; right: -100px; }
    .blob-2 { width: 400px; height: 400px; background: var(--sage); bottom: -100px; left: -100px; }

    .auth-card {
      width: 100%;
      max-width: 480px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 32px;
      padding: 50px 40px;
      box-shadow: var(--shadow-lg);
      position: relative;
      backdrop-filter: blur(10px);
    }
    
    .auth-controls {
      position: absolute;
      top: 24px;
      right: 24px;
      display: flex;
      gap: 8px;
    }
    

    .auth-header { text-align: center; margin-bottom: 30px; }
    .auth-header h2 { 
      font-size: 20px; 
      color: var(--text-primary); 
      font-family: 'Playfair Display', serif; 
      font-weight: 400; 
      font-style: italic;
      margin-top: 10px; 
    }
    
    .btn-login {
      width: 100%;
      padding: 18px;
      border-radius: 50px;
      border: none;
      background: var(--accent);
      color: #fff;
      font-weight: 700;
      font-size: 16px;
      text-transform: uppercase;
      letter-spacing: 1px;
      cursor: pointer;
      transition: all 0.3s ease;
      box-shadow: 0 10px 20px rgba(201,123,75,0.2);
      margin-top: 10px;
    }
    .btn-login:hover {
      background: var(--accent-dark);
      transform: translateY(-2px);
      box-shadow: 0 15px 30px rgba(201,123,75,0.3);
    }

    .or-divider {
      display: flex; align-items: center; gap: 16px;
      margin: 30px 0;
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
    }
    .or-divider::before, .or-divider::after {
      content: ''; flex: 1; height: 1px; background: var(--border);
    }

    .btn-social {
      width: 100%;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-primary);
      display: flex; align-items: center; justify-content: center; gap: 12px;
      font-weight: 600;
      margin-bottom: 12px;
      transition: all 0.3s;
    }
    .btn-social:hover { background: var(--bg-secondary); border-color: var(--accent); }

    .auth-footer { text-align: center; margin-top: 30px; font-size: 14px; color: var(--text-muted); }
    .auth-footer a { color: var(--accent); font-weight: 700; text-decoration: none; }
    
    [dir="rtl"] .auth-controls { right: auto; left: 24px; }

    @media (max-width: 480px) {
      .auth-card { padding: 40px 24px; border-radius: 24px; }
    }
  </style>
</head>
<body>

  <div class="bg-blobs">
    <div class="blob blob-1"></div>
    <div class="blob blob-2"></div>
  </div>

  <div class="auth-controls" style="position: fixed; top: 30px; right: 30px; display: flex; gap: 12px; z-index: 1000;">
    <button class="btn-toggle" onclick="toggleDir()" title="Toggle RTL/LTR"><span id="lang-toggle-text">LTR</span></button>
    <button class="btn-toggle" onclick="toggleTheme()" title="Toggle Theme"><i data-lucide="moon" id="themeIcon"></i></button>
  </div>

  <div class="auth-card">


    <div class="auth-header">
      <a href="index.html" class="logo" style="justify-content:center; margin-bottom: 30px;">
        <div class="logo-icon"><i data-lucide="armchair"></i></div>
        <span class="logo-text">Furni<span>que</span></span>
      </a>
      <h1 style="font-family:'Playfair Display', serif; font-size: 36px; margin-bottom: 8px;">Welcome</h1>
      <p style="color: var(--text-muted); font-size: 16px;">Please login to your account to continue</p>
    </div>

    <form action="user-dashboard.html">
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" class="form-input" placeholder="john@example.com" required />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" class="form-input" placeholder="Enter your password" required />
      </div>
      <div class="form-extras">
        <label class="remember-me"><input type="checkbox" /> Remember me</label>
        <a href="#" class="forgot-link">Forgot password?</a>
      </div>
      <button type="submit" class="btn-login">LOGIN</button>
    </form>

    <div class="or-divider">OR</div>

    <button class="btn-social">
      <img src="https://www.gstatic.com/images/branding/product/1x/gsa_512dp.png" alt="Google" style="width:20px" />
      Continue with Google
    </button>
    <button class="btn-social">
      <img src="https://upload.wikimedia.org/wikipedia/commons/b/b8/2021_Facebook_icon.svg" alt="Facebook" style="width:20px" />
      Continue with Facebook
    </button>

    <div class="auth-footer">
      Don't have an account? <a href="register.html">Register here</a>
    </div>
  </div>

  <script src="main.js"></script>
</body>
</html>
